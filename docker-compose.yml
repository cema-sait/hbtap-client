services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:8000/api}

    image: hbtap-client
    container_name: hbtap-client
    restart: unless-stopped

    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:8000/api}

    networks:
      - proxy

    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.bptap.rule=Host(`bptap.dev.cema.africa`)"
      - "traefik.http.routers.bptap.entrypoints=websecure"
      - "traefik.http.routers.bptap.tls.certresolver=letsencrypt"

      - "traefik.http.services.bptap.loadbalancer.server.port=3000"

networks:
  proxy:
    external: true